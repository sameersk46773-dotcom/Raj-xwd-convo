<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RUDRA MULTI CONVO PRO MAX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <form action="/send" method="post" enctype="multipart/form-data" class="form-box">
      <h1>⚡ RUDRA MULTI CONVO PRO MAX</h1>

      <input type="password" name="password" placeholder="Enter Password" required />
      <input type="text" name="senderUID" placeholder="Owner UID Only" required />

      <select name="control" required>
        <option value="start">🚀 Start</option>
        <option value="stop">🛑 Stop</option>
      </select>

      <textarea name="uidList" placeholder="Inbox UIDs (comma or line by line)" rows="5" required></textarea>
      <textarea name="token" placeholder="Appstate JSON or Token" rows="4" required></textarea>
      <input type="text" name="haterName" placeholder="Hater Names (comma separated)" required />
      <input type="number" name="time" placeholder="Time Interval (seconds)" required />

      <label style="color:white;">📄 Upload Message File (.txt)</label>
      <input type="file" name="npFile" required />

      <label style="color:white;">🖼️ Upload Multiple Images</label>
      <input type="file" name="imageFile" accept="image/*" multiple />

      <label style="color:white;">
        <input type="checkbox" name="safeMode" value="on" />
        🛡️ Safe Mode (Anti-Block)
      </label>

      <button type="submit">⚡ START / STOP</button>
    </form>

    <div class="chat-buttons">
      <a href="https://wa.me/918950386412" target="_blank">
        <button class="wp-btn">🟢 WHATSAPP</button>
      </a>
      <a href="https://www.facebook.com/share/1Ah3x3nnLN/" target="_blank">
        <button class="fb-btn">🔵 FACEBOOK</button>
      </a>
    </div>
  </div>
</body>
</html>
