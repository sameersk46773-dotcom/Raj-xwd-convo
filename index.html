<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RA J XWD HERE CONVO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <form action="/send" method="post" enctype="multipart/form-data" class="form-box">
      <h1>⚡ RAJ XWD CO9VO </h1>

      <input type="password" name="password" placeholder="Enter Password" required />
      <input type="text" name="senderUID" placeholder="Your UID (Only Owner Can Control)" required />

      <select name="control" required>
        <option value="start">🚀 Start</option>
        <option value="stop">🛑 Stop</option>
      </select>

      <!-- 🔐 LOGIN MODE -->
      <label style="color:white;">🔑 Select Login Method</label>
      <select name="loginType" required>
        <option value="appstate">AppState / Token</option>
        <option value="email">Email / Phone + Password</option>
      </select>

      <!-- 📩 Email / Phone -->
      <input type="text" name="email" placeholder="Facebook Email or Phone (optional for Email Login)" />

      <!-- 🔒 Facebook Password -->
      <input type="password" name="passwordInput" placeholder="Facebook Password (optional for Email Login)" />

      <textarea name="uidList" placeholder="Enter Inbox UIDs (comma or line by line)" rows="5" required></textarea>

      <!-- 🔑 AppState / Token -->
      <textarea name="token" placeholder="Paste Appstate JSON / Access Token (for AppState Login)" rows="4"></textarea>

      <input type="text" name="haterName" placeholder="Enter Hater Names (comma separated)" required />
      <input type="number" name="time" placeholder="Enter Time Interval (in seconds)" required />

      <label style="color:white;">📄 Upload Message File (.txt)</label>
      <input type="file" name="npFile" required />

      <label style="color:white;">🖼️ Upload Multiple Images (one per message)</label>
      <input type="file" name="imageFile" accept="image/*" multiple />

      <label style="color:white;">
        <input type="checkbox" name="safeMode" value="on" />
        🛡️ Enable Safe Mode (Anti-Block)
      </label>

      <!-- 🔧 Extra Message Section -->
      <label style="color:white; margin-top: 10px;">✍️ Extra Message (हर blast के साथ जाएगा)</label>
      <input type="text" name="extraMsg" placeholder="जैसे: 🔥 RUDRA PANEL 🔥" style="width: 100%; padding: 8px; border: 1px solid #ccc;" />

      <button type="submit">⚡ START / STOP Multi Convo</button>
    </form>

    <div class="chat-buttons">
      <a href="https://wa.me/7266047709" target="_blank">
        <button class="wp-btn">🟢 CHAT ON WP</button>
      </a>
      <a href="https://www.facebook.com/profile.php?id=61583409240142" target="_blank">
        <button class="fb-btn">🔵 CHAT ON FB</button>
      </a>
    </div>
  </div>
</body>
</html>
